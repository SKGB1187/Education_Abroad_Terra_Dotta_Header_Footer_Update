<style>

    .td-page-header {

    #ea-td-header .ea-td-university,

    #ea-td-header .ea-td-brand-sub { color:#9b9b9b; font-size:1.5rem; display:block; padding-bottom: 0.8rem; font-weight: bold;}

        width: 260px;
        max-width: 100%;
        height: auto;
        max-height: none;
